<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>
  <!-- Contenedor principal -->
  <rect x="80" y="90" width="352" height="260" rx="20" fill="#1e293b" stroke="#5ec8f2" stroke-width="6"/>
  <!-- Pantalla/Monitor -->
  <rect x="110" y="120" width="292" height="190" rx="10" fill="#0f172a"/>
  <!-- Barra superior del dashboard -->
  <rect x="110" y="120" width="292" height="34" rx="10" fill="#1e3a5f"/>
  <circle cx="138" cy="137" r="8" fill="#5ec8f2"/>
  <circle cx="165" cy="137" r="8" fill="#45a29a"/>
  <circle cx="192" cy="137" r="8" fill="#2d3748"/>
  <!-- Líneas de datos del dashboard -->
  <rect x="130" y="175" width="80" height="10" rx="5" fill="#5ec8f2" opacity="0.9"/>
  <rect x="130" y="196" width="120" height="8" rx="4" fill="#45a29a" opacity="0.7"/>
  <rect x="130" y="214" width="100" height="8" rx="4" fill="#45a29a" opacity="0.5"/>
  <!-- Gráfico de barras -->
  <rect x="290" y="220" width="22" height="70" rx="4" fill="#5ec8f2" opacity="0.8"/>
  <rect x="320" y="195" width="22" height="95" rx="4" fill="#45a29a" opacity="0.9"/>
  <rect x="350" y="210" width="22" height="80" rx="4" fill="#5ec8f2" opacity="0.6"/>
  <!-- Base del monitor -->
  <rect x="220" y="350" width="72" height="16" rx="6" fill="#2d3748"/>
  <rect x="196" y="366" width="120" height="16" rx="8" fill="#1e293b" stroke="#5ec8f2" stroke-width="4"/>
  <!-- Icono de check/ok abajo -->
  <circle cx="256" cy="430" r="32" fill="#45a29a"/>
  <polyline points="240,430 252,442 272,418" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
